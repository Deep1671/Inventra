<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.3"/>

  <!-- Main icon group -->
  <g transform="translate(100, 100)">

    <!-- Smart nodes (representing intelligence/connectivity) -->
    <!-- Top-left node -->
    <circle cx="-35" cy="-35" r="4" fill="url(#logoGradient)"/>
    <!-- Top-right node -->
    <circle cx="35" cy="-35" r="4" fill="url(#logoGradient)"/>
    <!-- Bottom-left node -->
    <circle cx="-35" cy="35" r="4" fill="url(#logoGradient)"/>
    <!-- Bottom-right node -->
    <circle cx="35" cy="35" r="4" fill="url(#logoGradient)"/>

    <!-- Connection lines (representing smart connections) -->
    <line x1="-35" y1="-35" x2="35" y2="-35" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="-35" y1="-35" x2="-35" y2="35" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="-35" x2="35" y2="35" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="-35" y1="35" x2="35" y2="35" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="-35" y1="-35" x2="35" y2="35" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.4"/>
    <line x1="35" y1="-35" x2="-35" y2="35" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.4"/>

    <!-- Center box (inventory storage) -->
    <rect x="-18" y="-18" width="36" height="36" fill="none" stroke="url(#logoGradient)" stroke-width="2" rx="4"/>

    <!-- Inner elements for depth -->
    <path d="M -12 -6 L 12 -6 M -12 0 L 12 0 M -12 6 L 12 6" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>

    <!-- Small decorative elements at corners -->
    <circle cx="-20" cy="-20" r="2.5" fill="url(#accentGradient)" opacity="0.8"/>
    <circle cx="20" cy="-20" r="2.5" fill="url(#accentGradient)" opacity="0.8"/>
    <circle cx="-20" cy="20" r="2.5" fill="url(#accentGradient)" opacity="0.8"/>
    <circle cx="20" cy="20" r="2.5" fill="url(#accentGradient)" opacity="0.8"/>

  </g>
</svg>
